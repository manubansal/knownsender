polling_interval_seconds: 30

labels:
  - id: known-sender
    name: "Known Sender"
    description: "Someone you've emailed before"
    unknown_label: "unknown-sender"
    rules:
      - field: "from"
        known_sender: true

  - id: newsletter
    name: "Newsletter"
    description: "Newsletters and mailing lists"
    rules:
      - field: "from"
        contains: ["newsletter", "noreply"]
      - field: "subject"
        contains: ["unsubscribe", "weekly digest"]

  - id: finance
    name: "Finance"
    description: "Billing, invoices, and payment receipts"
    rules:
      - field: "from"
        contains: ["billing", "invoice", "receipts"]
      - field: "subject"
        contains: ["invoice", "receipt", "payment"]
