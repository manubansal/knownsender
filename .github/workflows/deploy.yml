name: Deploy

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: claven

concurrency:
  group: live-gmail-tests
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Test, build, and deploy backend
    runs-on: ubuntu-latest

    # id-token:write is required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/claven/server:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/claven/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/claven/server:${{ github.sha }}
          secrets: |-
            DATABASE_URL=database-url:latest
            TOKEN_ENCRYPTION_KEY=token-encryption-key:latest
            OAUTH_CLIENT_SECRET=oauth-client-secret:latest
            INTERNAL_API_SECRET=internal-api-secret:latest
            SESSION_SECRET=session-secret:latest
          env_vars: |-
            OAUTH_CLIENT_ID=${{ secrets.OAUTH_CLIENT_ID }}
            OAUTH_REDIRECT_URI=${{ secrets.OAUTH_REDIRECT_URI }}
            PUBSUB_TOPIC=${{ secrets.PUBSUB_TOPIC }}
            PUBSUB_AUDIENCE=https://api.claven.app/webhook/gmail
            FRONTEND_URL=https://claven.app
            CORS_EXTRA_ORIGINS=http://localhost:3000
          flags: >-
            --min-instances=0
            --max-instances=10
            --concurrency=80
            --timeout=300

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for new revision to become ready..."
          sleep 10

          # Health check — verifies the server is up and DB is reachable
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.claven.app/healthz)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /healthz returned $STATUS"
            exit 1
          fi
          echo "OK: /healthz returned 200"

          # Sign-in smoke test — exercises the full /api/me code path
          # Look up test user ID, create a session JWT, and verify /api/me returns 200
          python - <<'PYEOF'
          import os, sys, json
          import psycopg2, jwt

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          with conn.cursor() as cur:
              cur.execute("SELECT id::text FROM users WHERE email = %s", (os.environ["TEST_GMAIL_EMAIL"],))
              row = cur.fetchone()
          conn.close()

          if not row:
              print("SKIP: test user not found in DB")
              sys.exit(0)

          user_id = row[0]
          token = jwt.encode(
              {"user_id": user_id, "email": os.environ["TEST_GMAIL_EMAIL"]},
              os.environ["SESSION_SECRET"],
              algorithm="HS256",
          )

          import urllib.request
          req = urllib.request.Request(
              "https://api.claven.app/api/me",
              headers={"Cookie": f"session={token}"},
          )
          try:
              resp = urllib.request.urlopen(req)
              print(f"OK: /api/me returned {resp.status}")
          except urllib.error.HTTPError as e:
              print(f"FAIL: /api/me returned {e.code}")
              print(e.read().decode()[:200])
              sys.exit(1)
          PYEOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TEST_GMAIL_EMAIL: ${{ secrets.TEST_GMAIL_EMAIL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

  deploy-frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run cf:build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://api.claven.app

      - name: Deploy to Cloudflare Workers
        run: npx opennextjs-cloudflare deploy
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
