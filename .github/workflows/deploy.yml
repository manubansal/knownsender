name: Deploy

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: claven

jobs:
  deploy:
    name: Test, build, and deploy
    runs-on: ubuntu-latest

    # id-token:write is required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest --tb=short

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/claven/server:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/claven/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Migrations run here before the new container takes traffic.
      # This step is a no-op until claven/core/db.py and Alembic are set up.
      # Uncomment when migrations exist:
      # - name: Run database migrations
      #   run: alembic upgrade head
      #   env:
      #     DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/claven/server:${{ github.sha }}
          min_instances: 0
          max_instances: 10
          timeout: 300
          concurrency: 80
          env_vars: |-
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}
