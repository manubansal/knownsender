name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure node is in system PATH
        run: |
          NODE_BIN=$(which node 2>/dev/null || true)
          if [ -n "$NODE_BIN" ] && [ ! -e /usr/local/bin/node ]; then
            sudo ln -sf "$NODE_BIN" /usr/local/bin/node
          fi

      - name: Start Postgres
        run: |
          sudo chmod 666 /var/run/docker.sock
          docker rm -f postgres 2>/dev/null || true
          docker run -d \
            --name postgres \
            --network host \
            -e POSTGRES_USER=claven \
            -e POSTGRES_PASSWORD=claven \
            -e POSTGRES_DB=claven_test \
            postgres:16
          until docker exec postgres pg_isready -U claven -q; do sleep 1; done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://claven:claven@localhost:5432/claven_test
        run: alembic upgrade head

      - name: Run tests
        env:
          PYTEST_DATABASE_URL: postgresql://claven:claven@localhost:5432/claven_test
          TEST_GMAIL_REFRESH_TOKEN: ${{ secrets.TEST_GMAIL_REFRESH_TOKEN }}
          TEST_GMAIL_EMAIL: ${{ secrets.TEST_GMAIL_EMAIL }}
          PUBSUB_TOPIC: ${{ secrets.PUBSUB_TOPIC }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: pytest --tb=short
