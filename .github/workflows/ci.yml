name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: claven
          POSTGRES_PASSWORD: claven
          POSTGRES_DB: claven_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claven"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://claven:claven@localhost:5432/claven_test
        run: alembic upgrade head

      - name: Run tests
        env:
          PYTEST_DATABASE_URL: postgresql://claven:claven@localhost:5432/claven_test
          TEST_GMAIL_REFRESH_TOKEN: ${{ secrets.TEST_GMAIL_REFRESH_TOKEN }}
          TEST_GMAIL_EMAIL: ${{ secrets.TEST_GMAIL_EMAIL }}
          PUBSUB_TOPIC: ${{ secrets.PUBSUB_TOPIC }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: pytest --tb=short
