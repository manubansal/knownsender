[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    unit: pure logic, no I/O
    integration: requires a real database (set PYTEST_DATABASE_URL)
    server: HTTP layer via test client
    e2e: requires TEST_GMAIL_REFRESH_TOKEN and PYTEST_DATABASE_URL
    live: requires TEST_GMAIL_REFRESH_TOKEN, PYTEST_DATABASE_URL, PUBSUB_TOPIC, OAUTH_CLIENT_ID/SECRET, TOKEN_ENCRYPTION_KEY; makes real Gmail API calls
